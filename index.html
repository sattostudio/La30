<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA 30</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #020617;
    color: white;
    padding-bottom: 80px; 
}   
    
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.logo {
    height: 60px;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #aaa;
    font-weight: 300;
}

nav a:hover {
    color: #fff;
}

.hero {
display: flex;
justify-content: space-between;
align-items: center;
padding: 80px 60px;
background: radial-gradient(circle at 70% 50%, rgba(255,0,200,0.15), transparent 40%);
}

.hero-left h1 {
font-size: 70px;
font-weight: 700;
margin: 0;
}

.hero-left h2 {
font-size: 28px;
background: linear-gradient(90deg, #00f0ff, #ff00c8, #ff7a00);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.hero-left p {
color: #aaa;
margin: 20px 0;
}

.hero-logo {
width: 350px;
filter: drop-shadow(0 0 30px #ff00c8);
}

.btn-glow {
padding: 14px 28px;
border-radius: 40px;
border: none;
color: white;
background: linear-gradient(90deg, #00f0ff, #ff00c8, #ff7a00);
cursor: pointer;
box-shadow: 0 0 20px rgba(255,0,200,0.5);
}
 
.player {
    margin: 40px;
    padding: 30px;
    border-radius: 20px;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00f0ff, #ff00c8, #ff7a00);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.section {
    padding: 40px;
}

.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: #0f172a;
    padding: 20px;
    border-radius: 15px;
    flex: 1;
}

footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

.player-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    width: 90%;
    max-width: 900px;
    
    background: rgba(10,10,20,0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 25px;
    
    z-index: 999;
}

.player-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.player-info p {
    margin: 0;
    font-size: 12px;
    color: #aaa;
}

.live-dot {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
}

.player-controls {
    display: flex;
    align-items: center;
}

.play-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #00f0ff, #ff00c8, #ff7a00);
    color: white;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,0,200,0.6);
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(255,0,200,0.4); }
    50% { box-shadow: 0 0 25px rgba(255,0,200,0.8); }
    100% { box-shadow: 0 0 10px rgba(255,0,200,0.4); }
}

.play-btn {
    animation: glowPulse 2s infinite;
}

.btn-glow:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255,0,200,0.9);
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0,240,255,0.4);
    transition: 0.3s;
}

.logo {
    height: 60px;
    filter: drop-shadow(0 0 10px #00f0ff)
            drop-shadow(0 0 20px #ff00c8);
}

body {
    background: radial-gradient(circle at 20% 30%, rgba(0,240,255,0.08), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,0,200,0.08), transparent 40%),
                #020617;
}

.hero-left h1 {
    position: relative;
}

.hero-left h1::after {
    content: "LA 30";
    position: absolute;
    left: 2px;
    top: 2px;
    color: #ff00c8;
    opacity: 0.3;
} 
    
    
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <nav>
        <a href="#">Inicio</a>
        <a href="#">En vivo</a>
        <a href="#">Programación</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<section class="hero">
<div class="hero-left">
<h1>LA 30</h1>
<h2>MÚSICA SIN LÍMITES</h2>
<p>
Urbano, electrónica y más. 
Transmitimos 24/7 para acompañarte donde estés.
</p>

<button class="btn-glow">🔴 Escuchar en vivo</button>
</div>

<div class="hero-right">
<img src="logo.png" class="hero-logo">
</div>
</section>

<div class="player">
    <div>
        <h2>🔴 EN VIVO</h2>
        <p>LA 30 - Música sin límites</p>
    </div>
    <div class="play-btn" onclick="toggleRadio()">▶</div>
</div>

<audio id="radio" src="https://radio.conectarservidor.com:8006/stream"></audio>

<section class="section">
    <h2>Sonando ahora</h2>
    <div class="cards">
        <div class="card">Track actual...</div>
        <div class="card">Trap / Hip Hop</div>
        <div class="card">Techno / House</div>
    </div>
</section>

<footer>
    © 2026 LA 30
</footer>

<script>
const nowPlaying = document.getElementById("nowPlaying");

function toggleRadio() {
    if (!playing) {
        radio.play();
        playing = true;
        updateButtons("⏸");
        nowPlaying.textContent = "Reproduciendo 🔊";
    } else {
        radio.pause();
        playing = false;
        updateButtons("▶");
        nowPlaying.textContent = "En vivo 🔴";
    }
}
</script>

<div class="player-bar">
    <div class="player-info">
        <span class="live-dot"></span>
        <div>
            <strong>LA 30</strong>
            <p id="nowPlaying">En vivo 🔴</p>
        </div>
    </div>

    <div class="player-controls">
        <button onclick="toggleRadio()" class="play-btn">▶</button>
    </div>
</div>
    
</body>
</html>
