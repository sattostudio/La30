<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA 30</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: white;
    background:
    radial-gradient(circle at 20% 30%, rgba(0,240,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,200,0.08), transparent 40%),
    #020617;

    padding-bottom: 120px;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.logo {
    height: 60px;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #aaa;
}

nav a:hover {
    color: white;
}

/* HERO */
.hero-pro {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 80px 60px;
}

.hero-pro h1 {
    font-size: 80px;
    margin: 0;
}

.hero-pro h2 {
    font-size: 30px;
    background: linear-gradient(90deg, #00f0ff, #ff00c8, #ff7a00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn-live {
    margin-top: 20px;
    padding: 14px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #ff00c8, #ff7a00);
    color: white;
    box-shadow: 0 0 20px rgba(255,0,200,0.7);
}

/* PLAYER PRINCIPAL */
.main-player {
    margin: 40px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(10px);

    display: flex;
    justify-content: space-between;
    align-items: center;

    box-shadow: 0 0 40px rgba(255,0,200,0.2);
}

.play-main {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    color: white;
    cursor: pointer;

    background: linear-gradient(135deg, #00f0ff, #ff00c8);
    box-shadow: 0 0 30px rgba(255,0,200,0.7);
}

/* TARJETAS */
.section {
    padding: 40px;
}

.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: #0f172a;
    padding: 20px;
    border-radius: 15px;
    flex: 1;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* PLAYER FLOTANTE */
.player-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    width: 90%;
    max-width: 900px;

    background: rgba(10,10,20,0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 12px 25px;
    z-index: 999;
}

.play-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    cursor: pointer;

    background: linear-gradient(135deg, #00f0ff, #ff00c8);
    color: white;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <nav>
        <a href="#">Inicio</a>
        <a href="#">En vivo</a>
        <a href="#">Programación</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<section class="hero-pro">
    <div>
        <h1>LA 30</h1>
        <h2>MÚSICA SIN LÍMITES</h2>
        <p>Urbano, electrónica y más. Transmitimos 24/7.</p>

        <button class="btn-live" onclick="toggleRadio()">🔴 EN VIVO</button>
    </div>

    <img src="logo.png" width="300">
</section>

<!-- PLAYER PRINCIPAL -->
<div class="main-player">
    <div>
        <h3>LA 30</h3>
        <p id="nowPlaying">Música sin límites</p>
    </div>

    <button class="play-main play-control" onclick="toggleRadio()">▶</button>

    <input type="range" min="0" max="1" step="0.01" value="1"
        onchange="radio.volume = this.value">
</div>

<audio id="radio" src="https://radio.conectarservidor.com:8006/stream"></audio>

<section class="section">
    <h2>Sonando ahora</h2>
    <div class="cards">
        <div class="card">Track actual</div>
        <div class="card">Hip Hop</div>
        <div class="card">Techno</div>
    </div>
</section>

<footer>
    © 2026 LA 30
</footer>

<!-- PLAYER FLOTANTE -->
<div class="player-bar">
    <div>
        <strong>LA 30</strong>
        <p id="statusText">En vivo 🔴</p>
    </div>

    <button class="play-btn play-control" onclick="toggleRadio()">▶</button>
</div>

<script>
const radio = document.getElementById("radio");
const controls = document.querySelectorAll(".play-control");
const statusText = document.getElementById("statusText");

let playing = false;

function toggleRadio() {
    if (!playing) {
        radio.play().catch(err => console.log(err));
        playing = true;
        updateUI("⏸", "Reproduciendo 🔊");
    } else {
        radio.pause();
        playing = false;
        updateUI("▶", "En vivo 🔴");
    }
}

function updateUI(icon, text) {
    controls.forEach(btn => btn.textContent = icon);
    statusText.textContent = text;
}
</script>

</body>
</html>
